<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish – Sog'lom Turmush</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #27ae60 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand-icon { font-size: 3rem; color: #2ecc71; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="brand-icon"><i class="bi bi-heart-pulse-fill"></i></div>
            <h4 class="fw-bold mt-2">Sog'lom Turmush</h4>
            <p class="text-muted small">Kaloriya va ovqat nazorat tizimi</p>
          </div>
          {% for msg in messages %}
          <div class="alert alert-danger small">{{ msg }}</div>
          {% endfor %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="text" name="username" class="form-control" placeholder="test@demo.com" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Parol</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
              </div>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
            </button>
          </form>
          <hr>
          <div class="text-center">
            <span class="text-muted small">Hisob yo'qmi? </span>
            <a href="{% url 'register' %}" class="text-success fw-semibold small">Ro'yxatdan o'tish</a>
          </div>
          <div class="mt-3 p-3 bg-light rounded small text-muted">
            <strong>Demo:</strong> test@demo.com / demo123
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
